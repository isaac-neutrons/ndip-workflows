<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1600" height="900" fill="#ffffff"/>

  <!-- Defs: arrow marker + drop shadow -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="800" y="55" text-anchor="middle" font-size="32" font-weight="700" fill="#0f172a">NDIP Workflows · State-Threading Pipeline</text>
  <text x="800" y="88" text-anchor="middle" font-size="17" fill="#475569">A single versioned JSON document flows through every Galaxy tool</text>

  <!-- ============================================================ -->
  <!-- Step 0 — Seed                                                  -->
  <!-- ============================================================ -->
  <g transform="translate(50, 150)">
    <rect width="280" height="290" rx="14" fill="#f1f5f9" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
    <rect width="280" height="46" rx="14" fill="#64748b"/>
    <rect y="32" width="280" height="14" fill="#64748b"/>
    <text x="140" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2">STEP 0 · SEED</text>

    <text x="20" y="78" font-size="16" font-weight="700" fill="#0f172a">seed_config.xml</text>
    <text x="20" y="100" font-size="12" fill="#475569">single run · event-file + seed</text>

    <text x="20" y="130" font-size="16" font-weight="700" fill="#0f172a">yaml_parser.xml</text>
    <text x="20" y="152" font-size="12" fill="#475569">batched · one YAML, many runs</text>

    <line x1="20" y1="170" x2="260" y2="170" stroke="#cbd5e1" stroke-width="1"/>

    <text x="20" y="194" font-size="12" font-weight="700" fill="#334155">Writes to state:</text>
    <text x="20" y="216" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">schema_version, run,</text>
    <text x="20" y="234" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">instrument, ipts, prompt,</text>
    <text x="20" y="252" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">paths.*, llm.*,</text>
    <text x="20" y="270" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">sequence_total</text>
  </g>

  <!-- ============================================================ -->
  <!-- Step 1 — Reduction                                            -->
  <!-- ============================================================ -->
  <g transform="translate(380, 150)">
    <rect width="280" height="290" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
    <rect width="280" height="46" rx="14" fill="#ea580c"/>
    <rect y="32" width="280" height="14" fill="#ea580c"/>
    <text x="140" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2">STEP 1 · REDUCTION</text>

    <text x="20" y="78" font-size="16" font-weight="700" fill="#0f172a">reduction.xml</text>
    <text x="20" y="100" font-size="12" fill="#475569">Mantid reduction</text>

    <text x="20" y="130" font-size="12" font-weight="700" fill="#9a3412">CLI</text>
    <text x="20" y="150" font-size="13" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">simple-reduction</text>

    <line x1="20" y1="170" x2="260" y2="170" stroke="#fed7aa" stroke-width="1"/>

    <text x="20" y="194" font-size="12" font-weight="700" fill="#334155">Writes to state:</text>
    <text x="20" y="216" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">reduction.success,</text>
    <text x="20" y="234" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">reduction.partial_file,</text>
    <text x="20" y="252" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">reduction.combined_file,</text>
    <text x="20" y="270" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">paths.raw_data</text>
  </g>

  <!-- ============================================================ -->
  <!-- Step 2 — Analysis                                              -->
  <!-- ============================================================ -->
  <g transform="translate(710, 150)">
    <rect width="280" height="290" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
    <rect width="280" height="46" rx="14" fill="#059669"/>
    <rect y="32" width="280" height="14" fill="#059669"/>
    <text x="140" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2">STEP 2 · ANALYSIS</text>

    <text x="20" y="78" font-size="16" font-weight="700" fill="#0f172a">simple_analyzer.xml</text>
    <text x="20" y="100" font-size="12" fill="#475569">plan + LLM-gated analyze</text>

    <text x="20" y="130" font-size="12" font-weight="700" fill="#065f46">CLIs (chained)</text>
    <text x="20" y="150" font-size="13" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">plan-data</text>
    <text x="20" y="168" font-size="13" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">analyze-sample</text>
    <text x="148" y="168" font-size="11" fill="#64748b">(gated)</text>

    <line x1="20" y1="184" x2="260" y2="184" stroke="#a7f3d0" stroke-width="1"/>

    <text x="20" y="206" font-size="12" font-weight="700" fill="#334155">Writes to state:</text>
    <text x="20" y="226" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">analysis.success,</text>
    <text x="20" y="244" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">analysis.model_name,</text>
    <text x="20" y="262" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">analysis.problem_json,</text>
    <text x="20" y="270" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a"></text>
  </g>

  <!-- ============================================================ -->
  <!-- Step 3 — Assembly                                              -->
  <!-- ============================================================ -->
  <g transform="translate(1040, 150)">
    <rect width="280" height="290" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <rect width="280" height="46" rx="14" fill="#7c3aed"/>
    <rect y="32" width="280" height="14" fill="#7c3aed"/>
    <text x="140" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="2">STEP 3 · ASSEMBLY</text>

    <text x="20" y="78" font-size="16" font-weight="700" fill="#0f172a">data_assembler.xml</text>
    <text x="20" y="100" font-size="12" fill="#475569">parquet bundle + ISAAC record</text>

    <text x="20" y="130" font-size="12" font-weight="700" fill="#5b21b6">CLIs (chained)</text>
    <text x="20" y="150" font-size="13" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">data-assembler ingest</text>
    <text x="20" y="168" font-size="13" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">nr-isaac-format</text>

    <line x1="20" y1="184" x2="260" y2="184" stroke="#ddd6fe" stroke-width="1"/>

    <text x="20" y="206" font-size="12" font-weight="700" fill="#334155">Writes to state:</text>
    <text x="20" y="226" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">assembly.success,</text>
    <text x="20" y="244" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">assembly.isaac_record,</text>
    <text x="20" y="262" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">assembly.metadata.*,</text>
    <text x="20" y="278" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">paths.assembled_directory</text>
  </g>

  <!-- ============================================================ -->
  <!-- Arrows between stages, with state document labels             -->
  <!-- ============================================================ -->
  <!-- Seed -> Reduction -->
  <g>
    <line x1="335" y1="290" x2="375" y2="290" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="355" y="278" text-anchor="middle" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#334155">state</text>
  </g>
  <!-- Reduction -> Analysis -->
  <g>
    <line x1="665" y1="290" x2="705" y2="290" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="685" y="278" text-anchor="middle" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#334155">state</text>
  </g>
  <!-- Analysis -> Assembly -->
  <g>
    <line x1="995" y1="290" x2="1035" y2="290" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="1015" y="278" text-anchor="middle" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#334155">state</text>
  </g>
  <!-- Terminal arrow -->
  <g>
    <line x1="1325" y1="290" x2="1370" y2="290" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="1420" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">terminal</text>
    <text x="1420" y="300" text-anchor="middle" font-size="12" fill="#475569">updated_config</text>
  </g>

  <!-- ============================================================ -->
  <!-- State contract band                                            -->
  <!-- ============================================================ -->
  <g transform="translate(50, 470)">
    <rect width="1500" height="80" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="30" font-size="13" font-weight="700" fill="#0f172a">CONTRACT</text>
    <text x="20" y="54" font-size="14" fill="#334155">
      Every tool accepts <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">config_json</tspan>
      (v1 state) and emits <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">updated_config</tspan>
      (same state + its own stage block). Underlying CLIs speak
      <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">--state-in PATH</tspan> /
      <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">--state-out PATH</tspan>,
    </text>
    <text x="20" y="72" font-size="14" fill="#334155">
      so an agent or shell script can drive the same pipeline without Galaxy. Failures are recorded as entries in
      <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">state.errors[]</tspan>;
      stage <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">success</tspan> flips to
      <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">false</tspan>.
    </text>
  </g>

  <!-- ============================================================ -->
  <!-- Cumulative state document growth                              -->
  <!-- ============================================================ -->
  <g transform="translate(50, 580)">
    <text x="0" y="0" font-size="15" font-weight="700" fill="#0f172a">Cumulative state document</text>
    <text x="0" y="20" font-size="12" fill="#64748b">each stage adds its own block; nothing is overwritten</text>

    <!-- After seed -->
    <g transform="translate(0, 40)">
      <rect width="350" height="220" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect width="350" height="26" rx="8" fill="#f1f5f9"/>
      <rect y="18" width="350" height="8" fill="#f1f5f9"/>
      <text x="12" y="18" font-size="12" font-weight="700" fill="#475569">after seed</text>
      <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0f172a">
        <text x="12" y="48">{</text>
        <text x="22" y="64">"schema_version": "1",</text>
        <text x="22" y="80">"run": 226644,</text>
        <text x="22" y="96">"instrument": "REF_L",</text>
        <text x="22" y="112">"ipts": "IPTS-36897",</text>
        <text x="22" y="128">"paths": { ... },</text>
        <text x="22" y="144">"llm": { ... },</text>
        <text x="22" y="160" fill="#94a3b8">"reduction": { "success": null },</text>
        <text x="22" y="176" fill="#94a3b8">"analysis":  { "success": null },</text>
        <text x="22" y="192" fill="#94a3b8">"assembly":  { "success": null },</text>
        <text x="22" y="208">"errors": []</text>
      </g>
    </g>

    <!-- After reduction -->
    <g transform="translate(380, 40)">
      <rect width="350" height="220" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
      <rect width="350" height="26" rx="8" fill="#fff7ed"/>
      <rect y="18" width="350" height="8" fill="#fff7ed"/>
      <text x="12" y="18" font-size="12" font-weight="700" fill="#9a3412">after reduction</text>
      <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0f172a">
        <text x="12" y="48">"reduction": {</text>
        <text x="22" y="64" fill="#16a34a">"success": true,</text>
        <text x="22" y="80" fill="#16a34a">"partial_file": ".../partial.txt",</text>
        <text x="22" y="96" fill="#16a34a">"combined_file": ".../combined.txt",</text>
        <text x="22" y="112" fill="#16a34a">"metadata": {</text>
        <text x="32" y="128" fill="#16a34a">"first_run_of_set": 226642</text>
        <text x="22" y="144" fill="#16a34a">}</text>
        <text x="12" y="160">},</text>
        <text x="12" y="180">"paths": {</text>
        <text x="22" y="196" fill="#16a34a">"raw_data": ".../226644.nxs.h5"</text>
        <text x="12" y="212">}</text>
      </g>
    </g>

    <!-- After analysis -->
    <g transform="translate(760, 40)">
      <rect width="350" height="220" rx="8" fill="#ffffff" stroke="#059669" stroke-width="1.5"/>
      <rect width="350" height="26" rx="8" fill="#ecfdf5"/>
      <rect y="18" width="350" height="8" fill="#ecfdf5"/>
      <text x="12" y="18" font-size="12" font-weight="700" fill="#065f46">after analysis</text>
      <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0f172a">
        <text x="12" y="48">"analysis": {</text>
        <text x="22" y="64" fill="#16a34a">"success": true,</text>
        <text x="22" y="80" fill="#16a34a">"model_name": "Cu-D2O-226642",</text>
        <text x="22" y="96" fill="#16a34a">"problem_json": ".../problem.json",</text>
        <text x="22" y="112" fill="#16a34a">"perform_assembly": true,</text>
        <text x="22" y="128" fill="#16a34a">"metadata": {</text>
        <text x="32" y="144" fill="#16a34a">"job_yaml": "...",</text>
        <text x="32" y="160" fill="#16a34a">"pipeline_status": "ok",</text>
        <text x="32" y="176" fill="#16a34a">"completed_stages":</text>
        <text x="42" y="192" fill="#16a34a">["partial", "fit"]</text>
        <text x="22" y="208" fill="#16a34a">}</text>
      </g>
    </g>

    <!-- After assembly -->
    <g transform="translate(1140, 40)">
      <rect width="360" height="220" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
      <rect width="360" height="26" rx="8" fill="#f5f3ff"/>
      <rect y="18" width="360" height="8" fill="#f5f3ff"/>
      <text x="12" y="18" font-size="12" font-weight="700" fill="#5b21b6">after assembly</text>
      <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0f172a">
        <text x="12" y="48">"assembly": {</text>
        <text x="22" y="64" fill="#16a34a">"success": true,</text>
        <text x="22" y="80" fill="#16a34a">"isaac_record":</text>
        <text x="32" y="96" fill="#16a34a">".../isaac_record_226644.json",</text>
        <text x="22" y="112" fill="#16a34a">"metadata": {</text>
        <text x="32" y="128" fill="#16a34a">"ingest_dir": "...",</text>
        <text x="32" y="144" fill="#16a34a">"ingest_status": "completed",</text>
        <text x="32" y="160" fill="#16a34a">"isaac_status": "converted",</text>
        <text x="32" y="176" fill="#16a34a">"parquet_files": { ... }</text>
        <text x="22" y="192" fill="#16a34a">}</text>
        <text x="12" y="208">}</text>
      </g>
    </g>

    <!-- Small arrows between snapshots -->
    <line x1="354" y1="150" x2="378" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-light)"/>
    <line x1="734" y1="150" x2="758" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-light)"/>
    <line x1="1114" y1="150" x2="1138" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-light)"/>
  </g>

  <!-- Footer -->
  <text x="800" y="880" text-anchor="middle" font-size="11" fill="#94a3b8">docs/state-handling.md · src/ndip_state/state.py</text>
</svg>
