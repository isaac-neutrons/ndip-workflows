<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 1080" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1700" height="1080" fill="#ffffff"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="850" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#0f172a">assess-result · how the AuRE-backed fit evaluation prompt is built</text>
  <text x="850" y="74" text-anchor="middle" font-size="16" fill="#475569">
    analyzer CLI runs <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">aure evaluate --json</tspan> as a subprocess; AuRE deserialises the fit, fills FIT_EVALUATION_PROMPT, and returns a JSON verdict
  </text>

  <!-- ============================================================ -->
  <!-- TOP BAND: assess-result wraps "aure evaluate"                 -->
  <!-- ============================================================ -->
  <g transform="translate(50, 100)">
    <rect width="1600" height="120" rx="12" fill="#f1f5f9" stroke="#475569" stroke-width="2" filter="url(#shadow)"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#0f172a" letter-spacing="1">analyzer CLI · assess-result</text>

    <!-- inside the wrapper -->
    <g transform="translate(20, 44)">
      <rect width="420" height="60" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="12" y="20" font-size="12" font-weight="700" fill="#334155">inputs</text>
      <text x="12" y="38" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">DIRECTORY  (refl1d fit dir)</text>
      <text x="12" y="52" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">--context / --sample-description / --hypothesis</text>
    </g>

    <g transform="translate(460, 44)">
      <rect width="500" height="60" rx="8" fill="#ecfeff" stroke="#0891b2"/>
      <text x="12" y="20" font-size="12" font-weight="700" fill="#155e75">subprocess call (run_aure_evaluate)</text>
      <text x="12" y="40" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0e7490">aure evaluate &lt;DIR&gt; --json \</text>
      <text x="12" y="54" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0e7490">     -c "&lt;context&gt;"  -h "&lt;hypothesis&gt;"</text>
    </g>

    <g transform="translate(980, 44)">
      <rect width="600" height="60" rx="8" fill="#ecfdf5" stroke="#059669"/>
      <text x="12" y="20" font-size="12" font-weight="700" fill="#065f46">on return: append_aure_section_to_report()</text>
      <text x="12" y="40" font-size="11" fill="#047857">parses JSON, renders <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace">## LLM Evaluation (AuRE)</tspan> section,</text>
      <text x="12" y="54" font-size="11" fill="#047857">writes/updates <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace">report_&lt;tag&gt;.md</tspan></text>
    </g>

    <!-- arrows along top band -->
    <line x1="440" y1="74" x2="460" y2="74" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="960" y1="74" x2="980" y2="74" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- subprocess boundary label -->
  <text x="850" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#475569" letter-spacing="2">───  process boundary  ·  inside  aure evaluate  ───</text>

  <!-- ============================================================ -->
  <!-- Column 1: INPUTS  (aure side)                                 -->
  <!-- ============================================================ -->
  <text x="50" y="280" font-size="14" font-weight="700" fill="#64748b" letter-spacing="2">PROMPT SLOTS  (computed inside AuRE)</text>

  <!-- problem.json -->
  <g transform="translate(50, 295)">
    <rect width="340" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <rect width="340" height="32" rx="10" fill="#3b82f6"/>
    <rect y="22" width="340" height="10" fill="#3b82f6"/>
    <text x="16" y="22" font-size="13" font-weight="700" fill="#ffffff">problem.json  →  FitResult</text>
    <text x="16" y="54" font-size="11" fill="#334155">bumps.serialize.deserialize() loads the</text>
    <text x="16" y="70" font-size="11" fill="#334155">refl1d FitProblem and</text>
    <text x="16" y="86" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">_extract_fit_result_from_problem()</text>
    <text x="16" y="104" font-size="11" fill="#64748b">→ chi², method, converged, parameters,</text>
    <text x="16" y="118" font-size="11" fill="#64748b">  uncertainties, per_file_results</text>
  </g>

  <!-- context + hypothesis -->
  <g transform="translate(50, 425)">
    <rect width="340" height="86" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2" filter="url(#shadow)"/>
    <rect width="340" height="32" rx="10" fill="#db2777"/>
    <rect y="22" width="340" height="10" fill="#db2777"/>
    <text x="16" y="22" font-size="13" font-weight="700" fill="#ffffff">sample_description  ·  hypothesis</text>
    <text x="16" y="54" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">-c &lt;text&gt;  (or --sample-description FILE)</text>
    <text x="16" y="70" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">-h &lt;hypothesis&gt;</text>
  </g>

  <!-- skill_context -->
  <g transform="translate(50, 521)">
    <rect width="340" height="76" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <rect width="340" height="32" rx="10" fill="#d97706"/>
    <rect y="22" width="340" height="10" fill="#d97706"/>
    <text x="16" y="22" font-size="13" font-weight="700" fill="#ffffff">skill_context  (domain knowledge)</text>
    <text x="16" y="54" font-size="11" fill="#334155">SKILL.md snippets injected at top of</text>
    <text x="16" y="70" font-size="11" fill="#334155">prompt — naming, BIC, structural rules</text>
  </g>

  <!-- features / boundaries / residuals -->
  <g transform="translate(50, 607)">
    <rect width="340" height="160" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <rect width="340" height="32" rx="10" fill="#16a34a"/>
    <rect y="22" width="340" height="10" fill="#16a34a"/>
    <text x="16" y="22" font-size="13" font-weight="700" fill="#ffffff">DERIVED ANALYSES  (per-fit)</text>
    <text x="16" y="54" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">_check_boundary_hits(fit_result)</text>
    <text x="16" y="68" font-size="10" fill="#64748b">  → params hitting min/max bounds</text>
    <text x="16" y="86" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">residual_analysis</text>
    <text x="16" y="100" font-size="10" fill="#64748b">  → residual fringes &amp; missing-layer hints</text>
    <text x="16" y="118" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">features</text>
    <text x="16" y="132" font-size="10" fill="#64748b">  → est. total thickness, roughness,</text>
    <text x="16" y="146" font-size="10" fill="#64748b">    critical edges Qc</text>
  </g>

  <!-- BIC / trajectory / hypotheses -->
  <g transform="translate(50, 777)">
    <rect width="340" height="180" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <rect width="340" height="32" rx="10" fill="#7c3aed"/>
    <rect y="22" width="340" height="10" fill="#7c3aed"/>
    <text x="16" y="22" font-size="13" font-weight="700" fill="#ffffff">ITERATION / COMPLEXITY CONTEXT</text>
    <text x="16" y="54" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">_format_trajectory(fit_history)</text>
    <text x="16" y="68" font-size="10" fill="#64748b">  → χ²/BIC per past iteration</text>
    <text x="16" y="86" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">_format_complexity_assessment</text>
    <text x="16" y="100" font-size="10" fill="#64748b">  → BIC, best_BIC, n_params, n_layers</text>
    <text x="16" y="118" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">structural_hypotheses</text>
    <text x="16" y="132" font-size="10" fill="#64748b">  → pending / tried / rejected list</text>
    <text x="16" y="150" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#0f172a">chi2_max</text>
    <text x="16" y="164" font-size="10" fill="#64748b">  → $CHI2_MAX acceptance threshold</text>
  </g>

  <!-- arrows: slots -> prompt -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none">
    <line x1="390" y1="355" x2="540" y2="380" marker-end="url(#arrow-light)"/>
    <line x1="390" y1="468" x2="540" y2="500" marker-end="url(#arrow-light)"/>
    <line x1="390" y1="559" x2="540" y2="600" marker-end="url(#arrow-light)"/>
    <line x1="390" y1="687" x2="540" y2="700" marker-end="url(#arrow-light)"/>
    <line x1="390" y1="867" x2="540" y2="780" marker-end="url(#arrow-light)"/>
  </g>

  <!-- ============================================================ -->
  <!-- Column 2: PROMPT TEMPLATE                                     -->
  <!-- ============================================================ -->
  <text x="550" y="280" font-size="14" font-weight="700" fill="#64748b" letter-spacing="2">FIT_EVALUATION_PROMPT  (format_fit_evaluation_prompt)</text>

  <g transform="translate(550, 295)">
    <rect width="600" height="700" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <rect width="600" height="32" rx="10" fill="#334155"/>
    <rect y="22" width="600" height="10" fill="#334155"/>
    <text x="16" y="22" font-size="13" font-weight="700" fill="#ffffff">HumanMessage  (single message, no SystemMessage)</text>

    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11">
      <text x="16" y="54" fill="#0f172a">"You are evaluating the results of a</text>
      <text x="16" y="68" fill="#0f172a"> neutron reflectivity fit."</text>

      <text x="16" y="92" fill="#334155">## Domain Knowledge</text>
      <text x="26" y="106" fill="#d97706">{skill_context}</text>

      <text x="16" y="128" fill="#334155">## Sample Description</text>
      <text x="26" y="142" fill="#db2777">{sample_description}</text>

      <text x="16" y="164" fill="#334155">## User's Hypothesis (if any)</text>
      <text x="26" y="178" fill="#db2777">{hypothesis}</text>

      <text x="16" y="200" fill="#334155">## Fit Results</text>
      <text x="26" y="214" fill="#3b82f6">- χ² (chi-squared): {chi_squared:.3f}</text>
      <text x="26" y="228" fill="#3b82f6">- Method: {method}    Converged: {converged}</text>

      <text x="16" y="250" fill="#334155">## χ² / BIC Trajectory  (iterations in order)</text>
      <text x="26" y="264" fill="#7c3aed">{trajectory}</text>

      <text x="16" y="286" fill="#334155">## Per-File Fit Quality  (multi-file co-refinement)</text>
      <text x="26" y="300" fill="#3b82f6">{per_file_chi2}</text>

      <text x="16" y="322" fill="#334155">## Best-fit Parameters</text>
      <text x="26" y="336" fill="#3b82f6">{parameters}</text>

      <text x="16" y="358" fill="#334155">## Extracted Data Features</text>
      <text x="26" y="372" fill="#16a34a">{features}</text>

      <text x="16" y="394" fill="#334155">## Residual Fringe Analysis</text>
      <text x="26" y="408" fill="#16a34a">{residual_analysis}</text>

      <text x="16" y="430" fill="#334155">## Parameters at Range Boundaries</text>
      <text x="26" y="444" fill="#16a34a">{boundary_hits}</text>

      <text x="16" y="466" fill="#334155">## Model Complexity  (BIC)</text>
      <text x="26" y="480" fill="#7c3aed">{complexity_assessment}</text>

      <text x="16" y="502" fill="#334155">## Ranked Structural Hypotheses</text>
      <text x="26" y="516" fill="#7c3aed">{structural_hypotheses}</text>

      <text x="16" y="540" fill="#334155">## Task</text>
      <text x="26" y="554" fill="#475569">Decide acceptable? physical? next action?</text>
      <text x="26" y="568" fill="#475569">Cite a pending hypothesis if param tweaks stalled.</text>

      <text x="16" y="592" fill="#334155">Respond in JSON format:</text>
      <text x="16" y="606" fill="#475569">{ "acceptable": bool, "quality_assessment": "...",</text>
      <text x="16" y="620" fill="#475569">  "issues": [...], "suggestions": [...],</text>
      <text x="16" y="634" fill="#475569">  "physical_concerns": [...],</text>
      <text x="16" y="648" fill="#475569">  "next_action": "parameter_tweak | structural_change | accept",</text>
      <text x="16" y="662" fill="#475569">  "proposed_hypothesis_id": int | null }</text>

      <text x="16" y="686" fill="#0f172a">**Acceptance threshold: χ² ≤ {chi2_max}.**</text>
    </g>
  </g>

  <text x="850" y="1010" text-anchor="middle" font-size="10" fill="#64748b">aure/nodes/prompts.py:210 FIT_EVALUATION_PROMPT · aure/nodes/evaluation.py:406 analyze_fit_quality_with_llm</text>

  <!-- Arrow: prompt -> LLM -->
  <g stroke="#334155" stroke-width="2" fill="none">
    <path d="M 1150 645 L 1210 645" marker-end="url(#arrow)"/>
  </g>

  <!-- ============================================================ -->
  <!-- Column 3: LLM + OUTPUT                                        -->
  <!-- ============================================================ -->
  <text x="1220" y="280" font-size="14" font-weight="700" fill="#64748b" letter-spacing="2">LLM CALL  &amp;  OUTPUTS</text>

  <!-- LLM box -->
  <g transform="translate(1220, 295)">
    <rect width="430" height="150" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" filter="url(#shadow)"/>
    <rect width="430" height="36" rx="12" fill="#d97706"/>
    <rect y="24" width="430" height="12" fill="#d97706"/>
    <text x="20" y="24" font-size="14" font-weight="700" fill="#ffffff">analyze_fit_quality_with_llm()</text>
    <text x="20" y="64" font-size="12" fill="#1c1917">via <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-weight="700">aure.llm.get_llm(temperature=0)</tspan></text>
    <text x="20" y="88" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#44403c">llm.invoke([HumanMessage(content=prompt)])</text>
    <text x="20" y="112" font-size="11" fill="#78716c">on parse failure → falls back to</text>
    <text x="20" y="128" font-size="11" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#78716c">_simple_evaluation()</text>
    <text x="20" y="144" font-size="11" fill="#78716c">(heuristic verdict from χ² alone)</text>
  </g>

  <!-- arrow LLM -> JSON -->
  <line x1="1435" y1="445" x2="1435" y2="475" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <!-- Raw JSON reply -->
  <g transform="translate(1220, 475)">
    <rect width="430" height="270" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
    <rect width="430" height="32" rx="10" fill="#334155"/>
    <rect y="22" width="430" height="10" fill="#334155"/>
    <text x="16" y="22" font-size="13" font-weight="700" fill="#ffffff">JSON verdict (printed to stdout)</text>
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0f172a">
      <text x="16" y="54">{</text>
      <text x="26" y="70" fill="#0369a1">"acceptable": true,</text>
      <text x="26" y="86" fill="#0369a1">"quality_assessment": "good",</text>
      <text x="26" y="102" fill="#0369a1">"chi_squared": 1.87,</text>
      <text x="26" y="118" fill="#0369a1">"issues": [</text>
      <text x="36" y="134" fill="#16a34a">"Ti thickness near upper bound"</text>
      <text x="26" y="150" fill="#0369a1">],</text>
      <text x="26" y="166" fill="#0369a1">"suggestions": [</text>
      <text x="36" y="182" fill="#16a34a">"Widen Ti.thickness range to 0–80 Å"</text>
      <text x="26" y="198" fill="#0369a1">],</text>
      <text x="26" y="214" fill="#0369a1">"physical_concerns": [],</text>
      <text x="26" y="230" fill="#0369a1">"next_action": "parameter_tweak",</text>
      <text x="26" y="246" fill="#0369a1">"proposed_hypothesis_id": null</text>
      <text x="16" y="262">}</text>
    </g>
  </g>

  <!-- arrow JSON -> report -->
  <line x1="1435" y1="745" x2="1435" y2="775" stroke="#334155" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <!-- Markdown report section -->
  <g transform="translate(1220, 775)">
    <rect width="430" height="200" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
    <rect width="430" height="32" rx="10" fill="#059669"/>
    <rect y="22" width="430" height="10" fill="#059669"/>
    <text x="16" y="22" font-size="13" font-weight="700" fill="#ffffff">report_&lt;tag&gt;.md  (## LLM Evaluation (AuRE))</text>
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#0f172a">
      <text x="16" y="54" fill="#475569">_render_aure_section() renders:</text>
      <text x="16" y="76">## LLM Evaluation (AuRE)</text>
      <text x="16" y="94">**Verdict**: good</text>
      <text x="16" y="110">**χ²**: 1.87</text>
      <text x="16" y="130">### Issues</text>
      <text x="16" y="146">- Ti thickness near upper bound</text>
      <text x="16" y="166">### Suggestions</text>
      <text x="16" y="182">- Widen Ti.thickness range...</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="850" y="1055" text-anchor="middle" font-size="12" fill="#94a3b8">
    analyzer side: analyzer_tools/analysis/result_assessor.py  ·  AuRE side: aure/cli.py:evaluate · aure/nodes/{evaluation, prompts}.py
  </text>
</svg>
